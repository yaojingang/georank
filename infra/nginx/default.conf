server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;
    port_in_redirect on;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = / {
        root /usr/share/nginx/custom_homepage;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /active/index.html @default_homepage;
    }

    location @default_homepage {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location ^~ /_custom_homepage/ {
        root /usr/share/nginx/custom_homepage;
        add_header X-Content-Type-Options "nosniff" always;
        rewrite ^/_custom_homepage/(.*)$ /$1 break;
        try_files $uri =404;
    }

    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /components/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location ~ "^/(?:manage|console|backend|control|dashboard|admin-[A-Za-z0-9][A-Za-z0-9_-]{1,42})(/.*)?$" {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        rewrite "^/(?:manage|console|backend|control|dashboard|admin-[A-Za-z0-9][A-Za-z0-9_-]{1,42})(/.*)?$" /admin$1 break;
        try_files $uri $uri.html $uri/ /admin/index.html;
    }

    location = /admin {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files /admin/index.html =404;
    }

    location ^~ /admin/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri.html $uri/ /admin/index.html;
    }

    location = /index.html {
        return 301 /;
    }

    location = /company.html {
        return 301 /company$is_args$args;
    }

    location = /diagnostic.html {
        return 301 /diagnostic$is_args$args;
    }

    location = /solutions.html {
        return 301 /solutions$is_args$args;
    }

    location = /qa {
        return 301 /solutions$is_args$args;
    }

    location ^~ /qa/ {
        return 301 /solutions$is_args$args;
    }

    location = /tutorial.html {
        return 301 /tutorial$is_args$args;
    }

    location = /tutorials {
        return 301 /tutorial$is_args$args;
    }

    location ^~ /tutorials/ {
        rewrite ^/tutorials/(.*)$ /tutorial/$1 permanent;
    }

    location = /keywords.html {
        return 301 /keywords;
    }

    location = /tools.html {
        return 301 /tools;
    }

    location = /experts.html {
        return 301 /experts;
    }

    location = /profile.html {
        return 301 /profile;
    }

    location = /company-submit.html {
        return 301 /submit-company$is_args$args;
    }

    location = /company {
        if ($arg_id != "") {
            return 301 /companies/$arg_id;
        }
        try_files /company.html =404;
    }

    location = /companies {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }

    location = /diagnostic {
        if ($arg_report != "") {
            return 301 /diagnostic/reports/$arg_report;
        }
        if ($arg_report_id != "") {
            return 301 /diagnostic/reports/$arg_report_id;
        }
        try_files /diagnostic.html =404;
    }

    location = /solutions {
        if ($arg_conversation != "") {
            return 301 /solutions/conversations/$arg_conversation;
        }
        if ($arg_conversation_id != "") {
            return 301 /solutions/conversations/$arg_conversation_id;
        }
        try_files /solutions.html =404;
    }

    location = /tutorial {
        if ($arg_slug != "") {
            return 301 /tutorial/$arg_slug;
        }
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location = /keywords {
        try_files /keywords.html =404;
    }

    location = /tools {
        try_files /tools.html =404;
    }

    location = /experts {
        try_files /experts.html =404;
    }

    location ^~ /experts/ {
        try_files /experts.html =404;
    }

    location = /profile {
        try_files /profile.html =404;
    }

    location = /submit-company {
        try_files /company-submit.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    location = /register {
        try_files /register.html =404;
    }

    location = /login.html {
        return 301 /login;
    }

    location = /register.html {
        return 301 /register;
    }

    location ^~ /companies/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location ^~ /c/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location ^~ /diagnostic/reports/ {
        try_files /diagnostic.html =404;
    }

    location ^~ /solutions/conversations/ {
        try_files /solutions.html =404;
    }

    location ^~ /tutorial/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
